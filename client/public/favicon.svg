<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- Background circle -->
  <rect width="64" height="64" rx="14" fill="#1d4ed8"/>

  <!-- Warehouse roof / triangle -->
  <polygon points="32,8 56,22 8,22" fill="#ffffff" opacity="0.95"/>

  <!-- Warehouse body -->
  <rect x="10" y="22" width="44" height="30" rx="1" fill="#ffffff" opacity="0.95"/>

  <!-- Left door panel -->
  <rect x="14" y="34" width="10" height="18" rx="1" fill="#1d4ed8"/>
  <!-- Right door panel -->
  <rect x="27" y="34" width="10" height="18" rx="1" fill="#1d4ed8"/>

  <!-- Door gap line -->
  <line x1="32" y1="34" x2="32" y2="52" stroke="#ffffff" stroke-width="1"/>

  <!-- Door knobs -->
  <circle cx="23" cy="43" r="1.2" fill="#ffffff"/>
  <circle cx="28.5" cy="43" r="1.2" fill="#ffffff"/>

  <!-- Shelf 1 -->
  <rect x="38" y="28" width="12" height="2" rx="0.5" fill="#1d4ed8"/>
  <!-- Box on shelf 1 -->
  <rect x="39" y="25" width="4" height="3" rx="0.5" fill="#3b82f6"/>
  <rect x="44" y="25.5" width="5" height="2.5" rx="0.5" fill="#3b82f6"/>

  <!-- Shelf 2 -->
  <rect x="38" y="37" width="12" height="2" rx="0.5" fill="#1d4ed8"/>
  <!-- Box on shelf 2 -->
  <rect x="39" y="34" width="5" height="3" rx="0.5" fill="#3b82f6"/>
  <rect x="45" y="34.5" width="4" height="2.5" rx="0.5" fill="#3b82f6"/>

  <!-- Chimney / flag pole -->
  <rect x="30" y="4" width="4" height="6" rx="0.5" fill="#93c5fd"/>
</svg>
